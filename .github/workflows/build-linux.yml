name: Build and Release Linux Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x86:
    name: Build Linux x86 (Ubuntu)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb binutils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --onefile --windowed --name image_extractor_exif_linux_x86 image_extractor_exif.py

      - name: Validate Binary Functionality
        run: |
          xvfb-run -a python -c "from PIL import Image; img = Image.new('RGB', (100, 100), color='red'); img.save('test_image.jpg', 'JPEG')"
          xvfb-run -a ./dist/image_extractor_exif_linux_x86 &
          PID=$!
          sleep 3
          kill $PID || echo "App completed execution or already closed"

      - name: Upload x86 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image_extractor_exif_linux_x86
          path: dist/image_extractor_exif_linux_x86

  build-linux-arm64:
    name: Build Linux ARM64 (Emulated Container)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Binary inside ARM64 Container
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/app ubuntu:22.04 /bin/bash -c "
          export DEBIAN_FRONTEND=noninteractive && 
          ln -fs /usr/share/zoneinfo/UTC /etc/localtime && 
          echo 'UTC' > /etc/timezone && 
          apt-get update && 
          apt-get install -y python3 python3-pip python3-tk python3-dev libpython3-dev xvfb binutils && 
          cd /app && 
          python3 -m pip install --upgrade pip && 
          pip3 install -r requirements.txt pyinstaller && 
          pyinstaller --onefile --windowed --name image_extractor_exif_linux_arm64 image_extractor_exif.py && 
          xvfb-run -a python3 -c \"from PIL import Image; img = Image.new('RGB', (100, 100), color='blue'); img.save('test_image.jpg', 'JPEG')\" && 
          xvfb-run -a ./dist/image_extractor_exif_linux_arm64 & 
          PID=\$! && 
          sleep 3 && 
          kill \$PID || echo 'App ran successfully'
          "

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image_extractor_exif_linux_arm64
          path: dist/image_extractor_exif_linux_arm64

  release:
    name: Publish Linux Binaries to GitHub Release
    needs: [build-linux-x86, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download x86 Artifact
        uses: actions/download-artifact@v4
        with:
          name: image_extractor_exif_linux_x86
          path: release-artifacts

      - name: Download ARM64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: image_extractor_exif_linux_arm64
          path: release-artifacts

      - name: Upload to Existing Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/image_extractor_exif_linux_x86
            release-artifacts/image_extractor_exif_linux_arm64
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}